<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
        }
        form {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 300px;
            padding: 8px;
            margin-right: 10px;
        }
        button {
            padding: 8px 16px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #f4f4f4;
            margin-bottom: 5px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a {
            text-decoration: none;
            color: red;
        }
    </style>
</head>
<body>
    <h1>Todo List</h1>
    <form method="post">
        <input type="text" name="todo" placeholder="Add a new todo item" required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for index, todo in enumerate(todos) %}
            <li>
                {{ todo }}
                <a href="{{ url_for('delete', index=index) }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
